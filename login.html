<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Restaurante</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <h1>🍽️ Restaurante</h1>
            <h2>Iniciar Sesión</h2>

            <div id="error-msg" class="alert alert-error" style="display:none;"></div>

            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="usuario" placeholder="Ingresa tu usuario" />
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" />
            </div>

            <button id="btn-login" onclick="login()">Iniciar Sesión</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
