<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reservas - Restaurante</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="navbar">
        <span class="nav-brand">Restaurante XYZ</span>
        <div class="nav-links">
            <a href="dashboard.html">Inicio</a>
            <a href="reservas.html" class="active">Mesas y Reservas</a>
            <a href="productos.html">Menú</a>
            <a href="pedidos.html">Pedidos</a>
            <button onclick="logout()" class="btn-logout">Salir</button>
        </div>
        <span id="nombre-usuario" class="user-tag">👤 Cargando...</span>
    </div>

    <div class="container">
        <h1>Gestión de Mesas y Reservas</h1>
        
        <div class="dashboard-grid" style="grid-template-columns: 1fr 2fr; gap: 2rem;">
            <div class="card" style="text-align: left;">
                <h3>Crear Nueva Reserva</h3>
                <div id="reserva-alert" class="alert alert-danger" style="display: none;"></div>
                <form id="form-reserva">
                    <div class="form-group">
                        <label>Nombre del Cliente</label>
                        <input type="text" id="res-cliente" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="res-telefono" required>
                    </div>
                    <div class="form-group">
                        <label>Cantidad de Personas</label>
                        <input type="number" id="res-personas" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="res-fecha" required>
                    </div>
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="time" id="res-hora" required>
                    </div>
                    <div class="form-group">
                        <label>Mesa Asignada</label>
                        <select id="res-mesa" required>
                            <option value="">Seleccione una mesa...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observaciones</label>
                        <input type="text" id="res-observaciones">
                    </div>
                    <button type="submit" class="btn-primary">Registrar Reserva</button>
                </form>
            </div>

            <div>
                <div class="card" style="margin-bottom: 2rem; text-align: left;">
                    <h3>Estado de las Mesas</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem;" id="lista-mesas">
                        </div>
                </div>

                <div class="card" style="text-align: left;">
                    <h3>Listado de Reservas</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid #cbd5e1; text-align: left;">
                                <th style="padding: 0.5rem;">Cliente</th>
                                <th style="padding: 0.5rem;">Mesa</th>
                                <th style="padding: 0.5rem;">Fecha/Hora</th>
                                <th style="padding: 0.5rem;">Pers.</th>
                                <th style="padding: 0.5rem;">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="lista-reservas">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/reservas.js"></script>
</body>
</html>
