<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservas - Restaurante XYZ</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <h2>Restaurante XYZ</h2>
            <a href="dashboard.html">Dashboard</a>
            <a class="active" href="reservas.html">Reservas y mesas</a>
            <a href="productos.html">Productos</a>
            <a href="pedidos.html">Pedidos</a>
            <button onclick="cerrarSesionFrontend()">Cerrar sesión</button>
        </aside>

        <main class="content">
            <div class="header">
                <h1>Gestión de mesas y reservas</h1>
                <p>Administra la disponibilidad del restaurante.</p>
            </div>

            <div class="grid">
                <section class="card">
                    <h2>Registrar mesa</h2>

                    <form id="formMesa">
                        <input type="hidden" id="mesaId">

                        <div class="form-grid">
                            <input type="text" id="numeroMesa" placeholder="Número o nombre">
                            <input type="number" id="capacidadMesa" placeholder="Capacidad">

                            <select id="estadoMesa">
                                <option value="disponible">Disponible</option>
                                <option value="reservada">Reservada</option>
                                <option value="ocupada">Ocupada</option>
                                <option value="fuera_servicio">Fuera de servicio</option>
                            </select>
                        </div>

                        <div class="actions">
                            <button type="submit" id="btnMesa">Guardar mesa</button>
                        </div>
                    </form>

                    <div id="mensajeMesa" class="mensaje"></div>
                </section>

                <section class="card">
                    <h2>Registrar reserva</h2>

                    <form id="formReserva">
                        <input type="hidden" id="reservaId">

                        <div class="form-grid">
                            <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
                            <input type="text" id="telefonoCliente" placeholder="Teléfono">
                            <input type="number" id="cantidadPersonas" placeholder="Cantidad de personas">
                            <input type="date" id="fechaReserva">
                            <input type="time" id="horaReserva">

                            <select id="mesa_id">
                                <option value="">Seleccione mesa</option>
                            </select>

                            <select id="estadoReserva">
                                <option value="pendiente">Pendiente</option>
                                <option value="confirmada">Confirmada</option>
                                <option value="cancelada">Cancelada</option>
                                <option value="finalizada">Finalizada</option>
                            </select>

                            <textarea class="full" id="observaciones" placeholder="Observaciones"></textarea>
                        </div>

                        <div class="actions">
                            <button type="submit" id="btnReserva">Guardar reserva</button>
                        </div>
                    </form>

                    <div id="mensajeReserva" class="mensaje"></div>
                </section>
            </div>

            <section class="card">
                <h2>Mesas</h2>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Número</th>
                            <th>Capacidad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaMesas"></tbody>
                </table>
            </section>

            <section class="card">
                <h2>Reservas</h2>

                <div class="form-grid">
                    <input type="date" id="filtroFecha">
                    <input type="text" id="filtroCliente" placeholder="Buscar cliente">

                    <select id="filtroEstadoReserva">
                        <option value="">Todos los estados</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="confirmada">Confirmada</option>
                        <option value="cancelada">Cancelada</option>
                        <option value="finalizada">Finalizada</option>
                    </select>

                    <button type="button" id="btnFiltrarReservas">Filtrar</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Teléfono</th>
                            <th>Personas</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Mesa</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaReservas"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/reservas.js"></script>
</body>
</html>
