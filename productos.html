<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos - Restaurante XYZ</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <h2>Restaurante XYZ</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="reservas.html">Reservas y mesas</a>
            <a class="active" href="productos.html">Productos</a>
            <a href="pedidos.html">Pedidos</a>
            <button onclick="cerrarSesionFrontend()">Cerrar sesión</button>
        </aside>

        <main class="content">
            <div class="header">
                <h1>Gestión de productos</h1>
                <p>Administración del menú del restaurante.</p>
            </div>

            <div class="grid">
                <section class="card">
                    <h2>Categorías</h2>

                    <form id="formCategoria">
                        <input type="text" id="nombreCategoria" placeholder="Nombre de categoría">
                        <br><br>
                        <textarea id="descripcionCategoria" placeholder="Descripción"></textarea>
                        <br><br>
                        <button type="submit">Guardar categoría</button>
                    </form>

                    <div id="mensajeCategoria" class="mensaje"></div>
                </section>

                <section class="card">
                    <h2>Producto</h2>

                    <form id="formProducto">
                        <input type="hidden" id="producto_id">

                        <div class="form-grid">
                            <input type="text" id="nombreProducto" placeholder="Nombre del producto">
                            <input type="number" id="precioProducto" placeholder="Precio">

                            <select id="categoria_id">
                                <option value="">Seleccione categoría</option>
                            </select>

                            <select id="disponibleProducto">
                                <option value="true">Disponible</option>
                                <option value="false">No disponible</option>
                            </select>

                            <textarea class="full" id="descripcionProducto" placeholder="Descripción"></textarea>
                        </div>

                        <div class="actions">
                            <button type="submit" id="btnProducto">Guardar producto</button>
                        </div>
                    </form>

                    <div id="mensajeProducto" class="mensaje"></div>
                </section>
            </div>

            <section class="card">
                <h2>Listado de categorías</h2>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCategorias"></tbody>
                </table>
            </section>

            <section class="card">
                <h2>Listado de productos</h2>

                <div class="form-grid">
                    <select id="filtroCategoria">
                        <option value="">Todas las categorías</option>
                    </select>

                    <select id="filtroDisponible">
                        <option value="">Todos</option>
                        <option value="true">Disponibles</option>
                        <option value="false">No disponibles</option>
                    </select>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Disponibilidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/productos.js"></script>
</body>
</html>
